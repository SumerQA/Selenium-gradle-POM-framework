plugins {
    // Apply the java-library plugin for API and implementation separation.
    id 'java'
    id 'test-report-aggregation'
}

repositories {
    // Use Maven Central for resolving dependencies.
  mavenCentral()
}

dependencies {
    implementation 'org.seleniumhq.selenium:selenium-java:4.20.0'
    implementation 'org.seleniumhq.selenium:selenium-server:4.0.0-alpha-2'
    testImplementation 'org.testng:testng:7.6.1'
    implementation 'io.qameta.allure:allure-testng:2.23.0'
    implementation group: 'org.apache.directory.studio', name: 'org.apache.commons.io', version: '2.4'
    implementation 'net.sourceforge.jexcelapi:jxl:2.6.12'
    testImplementation 'org.slf4j:slf4j-simple:2.0.16'
    implementation 'com.microsoft.sqlserver:mssql-jdbc:12.8.1.jre11'
    testImplementation group: 'org.uncommons', name: 'reportng', version: '1.1.4'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
 }
clean.doFirst {
   // delete "${projectDir}/GradleReports/"
   // delete "${projectDir}/test-output/"
    delete "${projectDir}/testng-xslt/Screenshot/"
    delete "${projectDir}/TestNG_Reports/"
}
